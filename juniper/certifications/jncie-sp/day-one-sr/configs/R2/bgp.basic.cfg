
interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 10.0.0.1/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/1 {
        unit 0 {
            family inet {
                address 10.0.0.4/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/3 {
        unit 0 {
            family inet {
                address 10.2.13.2/24;
            }
            family inet6 {
                address 2001:10:2:13::2/64;
            }
        }
    }
    ge-0/0/4 {
        unit 0 {
            family inet {
                address 10.2.12.2/24;
            }
            family inet6 {
                address 2001:10:2:12::2/64;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.2/32;
            }
            family inet6 {
                address fec0:0:0:1111::2/128;
            }
            family iso {
                address 49.0001.0000.0000.0002.00;
            }
        }
    }
}
protocols {
    isis {                              
        interface ge-0/0/0.0 {
            point-to-point;
        }
        interface ge-0/0/1.0 {
            point-to-point;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
    }
    mpls {
        interface ge-0/0/0.0;
        interface ge-0/0/1.0;
    }
    ldp {
        interface ge-0/0/0.0;
        interface ge-0/0/1.0;
    }
    bgp {
        group RR {
            type intenal;
            peer-as 100;
            local-address 192.168.0.2;
            neighbor 192.168.0.5;
            neighbor 192.168.0.7;
            export NHS;
        }
    }
}
policy-options {
    policy-statement NHS {
        from protocol bgp;
        then accept;
        then next-hop self;
    }
}
routing options {
    autonmous-system 100;
}
