
interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 10.0.0.1/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/1 {
        unit 0 {
            family inet {
                address 10.0.0.4/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/3 {
        vlan-tagging;
        unit 10 {
            vlan-id 10;
            family inet {
                address 10.13.10.2/24;
            }
        }
        unit 20 {
            vlan-id 20;
            family inet {
                address 10.13.20.2/24;
            }
        }
    }
    ge-0/0/4 {
        unit 0 {
            family inet {
                address 10.2.12.2/24;
            }
            family inet6 {
                address 2001:10:2:12::2/64;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.2/32;
            }
            family inet6 {
                address fec0:0:0:1111::2/128;
            }
            family iso {
                address 49.0001.0000.0000.0002.00;
            }
        }
    }
}
protocols {
    isis {                              
        interface ge-0/0/0.0 {
            point-to-point;
        }
        interface ge-0/0/1.0 {
            point-to-point;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
        source-packet-routing {
            node-segment {
                ipv4-index 402;
                ipv6-index 602;
            }
        }
    }
    mpls {
        interface ge-0/0/0.0;
        interface ge-0/0/1.0;
    }
    bgp {
        group INTERNAL {
            type internal;
            peer-as 100;
            local-address 192.168.0.2;
            neighbor 192.168.0.4;
            neighbor 192.168.0.5;
            family inet-vpn {
                unicast;
            }
        }
    }
}
policy-options {
    policy-statement EXPORT-A {
        term bgp {
            from protocol bgp;
            then {
                community add A-AS-100;
                accept;
            }
        }
        term last {
            then reject;
        }
    }
    policy-statement EXPORT-B {
        term bgp {
            from protocol bgp;
            then {
                community add B-AS-100;
                accept;
            }
        }
        term last {
            then reject;
        }
    }
    policy-statement IMPORT-A {
        term import {
            from community [ A-AS-100 A-AS-200 ];
            then accept;
        }
        term last {
            then reject;
        }
    }                                   
    policy-statement IMPORT-B {
        term import {
            from community [ B-AS-100 B-AS-200 ];
            then accept;
        }
        term last {
            then reject;
        }
    }
    community A-AS-100 members target:100:1;
    community A-AS-200 members target:200:1;
    community B-AS-100 members target:100:2;
    community B-AS-200 members target:200:2;
}
routing-options {
    autonomous-system 100;
}
routing-instances {
    A {
        instance-type vrf;
        protocols {
            bgp {
                group CE3 {
                    type external;
                    peer-as 1003;
                    neighbor 10.13.10.13;
                }
            }
        }
        interface ge-0/0/3.10;
        route-distinguisher 192.168.0.2:1;
        vrf-import IMPORT-A;
        vrf-export EXPORT-A;
    }
    B {
        instance-type vrf;
        protocols {
            bgp {
                group CE3 {
                    type external;
                    peer-as 1003;
                    neighbor 10.13.20.13;
                }
            }
        }
        interface ge-0/0/3.20;
        route-distinguisher 192.168.0.2:2;
        vrf-import IMPORT-B;
        vrf-export EXPORT-B;
    }
}
