interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 10.0.0.21/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/1 {
        unit 0 {
            family inet {
                address 10.0.0.19/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/2 {
        unit 0 {
            family inet {
                address 10.9.16.9/24;
            }
            family inet6 {
                address 2001:10:9:16::9/64;
            }
        }
    }
    ge-0/0/3 {
        unit 0 {
            family inet {
                address 10.9.15.9/24;
            }
            family inet6 {
                address 2001:10:9:15::9/64;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.9/32;
            }
            family inet6 {
                address fec0:0:0:1111::9/128;
            }
            family iso {
                address 49.0001.0000.0000.0009.00;
            }
        }
    }
}
protocols {
    isis {                              
        interface ge-0/0/0.0 {
            point-to-point;
        }
        interface ge-0/0/1.0 {
            point-to-point;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
        source-packet-routing {
            node-segment {
                ipv4-index 409;
                ipv6-index 609;
            }
        }
    }
    mpls {
        interface ge-0/0/0.0;
        interface ge-0/0/1.0;
    }
    bgp {
        group INTERNAL {
            type internal;
            peer-as 200;
            local-address 192.168.0.9;
            neighbor 192.168.0.6;
            neighbor 192.168.0.7;
            family inet-vpn {
                unicast;
            }
        }
    }
}
routing-options {
    autonomous-system 200;
}
policy-options {
    policy-statement EXPORT-B {
        term bgp {
            from protocol bgp;
            then {
                community add B-AS-200;
                accept;
            }
        }
        term last {
            then reject;
        }
    }
    policy-statement IMPORT-B {
        term import {
            from community [ B-AS-100 B-AS-200 ];
            then accept;
        }
        term last {
            then reject;
        }
    }
    community B-AS-100 members target:100:2;
    community B-AS-200 members target:200:2;
}
routing-instances {
    B {
        instance-type vrf;
        protocols {
            bgp {
                group CE1 {
                    type external;
                    peer-as 1006;
                    neighbor 10.9.16.16;
                }
            }
        }
        interface ge-0/0/3.0;
        route-distinguisher 192.168.0.9:2;
        vrf-import IMPORT-B;
        vrf-export EXPORT-B;
    }
}
