interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 10.0.0.21/31;
            }
            family inet6;
            family iso;
            family mpls {
                maximum-labels 16;
            }
        }
    }
    ge-0/0/1 {
        unit 0 {
            family inet {
                address 10.0.0.19/31;
            }
            family inet6;
            family iso;
            family mpls {
                maximum-labels 16;
            }
        }
    }
    ge-0/0/2 {
        unit 0 {
            family inet {
                address 10.9.16.9/24;
            }
            family inet6 {
                address 2001:10:9:16::9/64;
            }
        }
    }
    ge-0/0/3 {
        unit 0 {
            family inet {
                address 10.9.15.9/24;
            }
            family inet6 {
                address 2001:10:9:15::9/64;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.9/32;
            }
            family inet6 {
                address fec0:0:0:1111::9/128;
            }
            family iso {
                address 49.0001.0000.0000.0009.00;
            }
        }
    }
}
protocols {
    isis {                              
        interface ge-0/0/0.0 {
            point-to-point;
        }
        interface ge-0/0/1.0 {
            point-to-point;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
        source-packet-routing {
            node-segment {
                ipv4-index 409;
                ipv6-index 609;
            }
        }
        traffic-engineering l3-unicast-topology;
    }
    mpls {
        interface ge-0/0/0.0;
        interface ge-0/0/1.0;
    }
    bgp {
        group RR {
            type internal;
            peer-as 100;
            local-address 192.168.0.9;
            neighbor 192.168.0.5;
            neighbor 192.168.0.7;
            export NHS;
        }
    }
}
policy-options {
    policy-statement NHS {
        from protocol bgp;
        then accept;
        then next-hop self;
    }
}
routing-options {
    autonomous-system 100;
}
