interfaces {
    ge-0/0/2 {
        unit 0 {
            family inet {
                address 10.0.0.23/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/4 {
        unit 0 {
            family inet {
                address 10.0.0.24/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.3/32;
            }
            family inet6 {
                address fec0:0:0:1111::3/128;
            }
            family iso {
                address 49.0001.0000.0000.0003.00;
            }
        }
    }
}
protocols {
    isis {                              
        interface ge-0/0/2.0 {
            point-to-point;
        }
        interface ge-0/0/4.0 {
            point-to-point;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
    }
    mpls {
        interface ge-0/0/2.0;
        interface ge-0/0/4.0;
    }
    ldp {
        interface ge-0/0/2.0;
        interface ge-0/0/4.0;
    }
    bgp {
        group RR {
            type internal;
            peer-as 100;
            local-address 192.168.0.3;
            cluster 192.168.0.3;
            neighbor 192.168.0.1;
            neighbor 192.168.0.2;
            neighbor 192.168.0.8;
            neighbor 192.168.0.9;
            family l2vpn {
                signaling;
            }
        }
    }
}
routing-options {
    autonomous-system 100;
}
