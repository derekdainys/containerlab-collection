interfaces {
    ge-0/0/2 {
        unit 0 {
            family inet {
                address 10.0.0.23/31;
            }
            family inet6;
            family iso;
        }
    }
    ge-0/0/4 {
        unit 0 {
            family inet {
                address 10.0.0.24/31;
            }
            family inet6;
            family iso;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.3/32;
            }
            family inet6 {
                address fec0:0:0:1111::3/128;
            }
            family iso {
                address 49.0001.0000.0000.0003.00;
            }
        }
    }
}
protocols {
    isis {                              
        interface ge-0/0/2.0 {
            point-to-point;
        }
        interface ge-0/0/4.0 {
            point-to-point;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
        source-packet-routing {
            node-segment {
                ipv4-index 403;
                ipv6-index 603;
            }
        }
    }
    mpls {
        interface ge-0/0/2.0;
        interface ge-0/0/4.0;
    }
}

