chassis {
    fpc 0 {
        pic 0 {
            tunnel-services;
        }
    }
}
logical-systems {
    INTERNET {
        interfaces {
            lt-0/0/0 {
                unit 1 {
                    peer-unit 3;
                    encapsulation ethernet;
                    family inet {
                        address 90.3.90.90/24;
                    }
                }
            }
            lo0 {
                unit 90 {
                    family inet {
                        address 90.90.90.90/32;
                    }
                }
            }
        }
        protocols {
            bgp {
                group PEERING {
                    type external;
                    peer-as 100;
                    neighbor 90.3.90.3;
                    family inet {
                        unicast;
                    }
                    export DEFAULT-ONLY;
                }
            }
        }
        routing-options {
            autonomous-system 90;
            static {
                route 0.0.0.0/0 discard;
            }
        }
        policy-options {
            policy-statement DEFAULT-ONLY {
                from {
                    route-filter 0.0.0.0/0 exact;
                }
                then accept;
            }
        }
    }
}
interfaces {
    ge-0/0/2 {
        unit 0 {
            family inet {
                address 10.0.0.23/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/4 {
        unit 0 {
            family inet {
                address 10.0.0.24/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.3/32;
            }
            family inet6 {
                address fec0:0:0:1111::3/128;
            }
            family iso {
                address 49.0001.0000.0000.0003.00;
            }
        }
    }
    lt-0/0/0 {
        unit 3 {
            peer-unit 1:
            encapsulation ethernet;
            family inet {
                address 90.3.90.3/24;
            }
        }
    }
}
protocols {
    isis {                              
        interface ge-0/0/2.0 {
            point-to-point;
        }
        interface ge-0/0/4.0 {
            point-to-point;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
        source-packet-routing {
            node-segment {
                ipv4-index 403;
                ipv6-index 603;
            }
        }
    }
    mpls {
        interface ge-0/0/2.0;
        interface ge-0/0/4.0;
    }
    bgp {
        group RR {
            type internal;
            peer-as 100;
            local-address 192.168.0.3;
            neighbor 192.168.0.5;
            neighbor 192.168.0.7;
            family inet {
                unicast;
            }
            export NH-SELF;
        }
        group INTERNET {
            type external;
            peer-as 90;
            neighbor 90.3.90.90;
        }
    }
}
policy-options {
    policy-statement NH-SELF {
        from protocol bgp;
        then accept;
        then next-hop self;
    }
}
routing-options {
    autonomous-system 100;
}
