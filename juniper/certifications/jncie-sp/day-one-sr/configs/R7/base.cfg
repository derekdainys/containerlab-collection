chassis {
    aggregated-devices {
        ethernet {
            device-count 1;
        }
    }
}
interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 10.0.0.15/31;
            }
            family inet6;
        }
    }
    ge-0/0/1 {
        unit 0 {
            family inet {
                address 10.0.0.18/31;
            }
            family inet6;
        }
    }
    ge-0/0/2 {
        gigether-options {
            802.3ad ae0;
        }
    }
    ge-0/0/3 {
        gigether-options {
            802.3ad ae0;
        }
    }
    ae0 {
        aggregated-ether-options {
            lacp {
                active;
                periodic fast;
            }
        }
        unit 0 {
            family inet {
                address 10.0.0.13/31;
            }
            family inet6;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.7/32;
            }
            family inet6 {
                address fec0:0:0:1111::7/128;
            }
        }
    }
}
