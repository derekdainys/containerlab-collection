
interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 10.0.0.20/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/1 {
        unit 0 {
            family inet {
                address 10.0.0.17/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.8/32;
            }
            family inet6 {
                address fec0:0:0:1111::8/128;
            }
            family iso {
                address 49.0001.0000.0000.0008.00;
            }
        }
    }
}
protocols {
    isis {                              
        interface ge-0/0/0.0 {
            point-to-point;
        }
        interface ge-0/0/1.0 {
            point-to-point;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
    }
    mpls {
        interface ge-0/0/0.0;
        interface ge-0/0/1.0;
    }
    ldp {
        interface ge-0/0/0.0;
        interface ge-0/0/1.0;
    }
    bgp {
        group RR {
            type internal;
            peer-as 100;
            local-address 192.168.0.8;
            neighbor 192.168.0.3;
            family l2vpn {
                signaling;
            }
        }
    }
}
routing-options {
    autonomous-system 100;
}
