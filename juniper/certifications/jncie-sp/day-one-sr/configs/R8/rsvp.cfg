
interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 10.0.0.20/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/1 {
        unit 0 {
            family inet {
                address 10.0.0.17/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/2 {
        unit 0 {
            family inet {
                address 10.8.14.14/24;
            }
            family inet6 {
                address 2001:10:8:14::14/64;
            }
        }
    }
    ge-0/0/3 {
        unit 0 {
            family inet {
                address 10.8.15.15/24;
            }
            family inet6 {
                address 2001:10:8:15::15/64;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.8/32;
            }
            family inet6 {
                address fec0:0:0:1111::8/128;
            }
            family iso {
                address 49.0001.0000.0000.0008.00;
            }
        }
    }
}
protocols {
    isis {                              
        interface ge-0/0/0.0 {
            point-to-point;
        }
        interface ge-0/0/1.0 {
            point-to-point;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
    }
    mpls {
        interface ge-0/0/0.0;
        interface ge-0/0/1.0;
    }
    rsvp {
        interface ge-0/0/0.0;
        interface ge-0/0/1.0;
    }
}
