
interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 10.0.0.20/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/1 {
        unit 0 {
            family inet {
                address 10.0.0.17/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/2 {
        unit 0 {
            family inet {
                address 10.8.14.8/24;
            }
            family inet6 {
                address 2001:10:8:14::8/64;
            }
        }
    }
    ge-0/0/3 {
        unit 0 {
            family inet {
                address 10.8.15.8/24;
            }
            family inet6 {
                address 2001:10:8:15::8/64;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.8/32;
            }
            family inet6 {
                address fec0:0:0:1111::8/128;
            }
            family iso {
                address 49.0001.0000.0000.0008.00;
            }
        }
    }
}
protocols {
    isis {                              
        interface ge-0/0/0.0 {
            point-to-point;
        }
        interface ge-0/0/1.0 {
            point-to-point;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
        source-packet-routing {
            node-segment {
                ipv4-index 408;
                ipv6-index 608;
            }
        }
    }
    mpls {
        interface ge-0/0/0.0;
        interface ge-0/0/1.0;
    }
    bgp {
        group INTERNAL {
            type internal;
            peer-as 200;
            local-address 192.168.0.8;
            neighbor 192.168.0.6;
            neighbor 192.168.0.7;
            family inet-vpn {
                unicast;
            }
        }
    }
}
routing-options {
    autonomous-system 200;
}
policy-options {
    policy-statement EXPORT-A {
        term bgp {
            from protocol bgp;
            then {
                community add A-AS-200;
                accept;
            }
        }
        term last {
            then reject;
        }
    }
    policy-statement IMPORT-A {
        term import {
            from community [ A-AS-100 A-AS-200 ];
            then accept;
        }
        term last {
            then reject;
        }
    }
    community A-AS-100 members target:100:1;
    community A-AS-200 members target:200:1;
}
routing-instances {
    A {
        instance-type vrf;
        protocols {
            bgp {
                group CE1 {
                    type external;
                    peer-as 1004;
                    neighbor 10.8.14.14;
                }
            }
        }
        interface ge-0/0/2.0;
        route-distinguisher 192.168.0.8:1;
        vrf-import IMPORT-A;
        vrf-export EXPORT-A;
    }
}
