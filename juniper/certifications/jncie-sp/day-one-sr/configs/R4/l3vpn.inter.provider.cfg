interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 10.0.0.6/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/1 {
        unit 0 {
            family inet {
                address 10.0.0.3/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/2 {
        unit 0 {
            family inet {
                address 10.0.0.8/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    ge-0/0/3 {
        unit 0 {
            family inet {
                address 10.0.0.10/31;
            }
            family inet6;
            family iso;
            family mpls;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.4/32;
            }
            family inet6 {
                address fec0:0:0:1111::4/128;
            }
            family iso {
                address 49.0001.0000.0000.0004.00;
            }
        }
    }
}
protocols {
    isis {                              
        interface ge-0/0/0.0 {
            point-to-point;
        }
        interface ge-0/0/1.0 {
            point-to-point;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
        source-packet-routing {
            node-segment {
                ipv4-index 404;
                ipv6-index 604;
            }
        }
    }
    mpls {
        interface ge-0/0/0.0;
        interface ge-0/0/1.0;
    }
    bgp {
        group INTERNAL {
            type internal;
            peer-as 100;
            local-address 192.168.0.4;
            cluster 192.168.0.4;
            neighbor 192.168.0.1;
            neighbor 192.168.0.2;
            family inet-vpn {
                unicast;
            }
        }
    }
}
routing-options {
    autonomous-system 100;
}

