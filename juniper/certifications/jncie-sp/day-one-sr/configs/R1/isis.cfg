interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 10.0.0.0/31;
            }
            family inet6;
            family iso;
        }
    }
    ge-0/0/1 {
        unit 0 {
            family inet {
                address 10.0.0.2/31;
            }
            family inet6;
            family iso;
        }
    }
    ge-0/0/2 {                          
        unit 0 {
            family inet {
                address 10.0.0.22/31;
            }
            family inet6;
            family iso;
        }
    }
    ge-0/0/3 {
        unit 0 {
            family inet {
                address 10.1.11.1/24;
            }
            family inet6 {
                address 2001:10:1:11::1/64;
            }
        }
    }
    ge-0/0/4 {
        unit 0 {
            family inet {
                address 10.1.12.1/24;
            }
            family inet6 {
                address 2001:10:1:12::1/64;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.1/32;
            }
            family inet6 {
                address fec0:0:0:1111::1/128;
            }
            family iso {
                address 49.0001.0000.0000.0001.00;
            }
        }
    }
}
protocols {
    isis {                              
        interface ge-0/0/0.0 {
            point-to-point;
        }
        interface ge-0/0/1.0 {
            point-to-point;
        }
        interface ge-0/0/2.0 {
            point-to-point;
        }
        interface lo0.0 {
            passive;
        }
        level 1 disable;
        level 2 wide-metrics-only;
    }
}
