interfaces {
    ge-0/0/0 {
        vlan-tagging;
        unit 27 {
            vlan-id 27;
            family inet {
                address 172.30.27.7/24;
            }
            family iso;
        }
        unit 67 {
            vlan-id 67;
            family inet {
                address 172.30.67.7/24;
            }
            family iso;
        }
        unit 78 {
            vlan-id 78;
            family inet {
                address 172.30.78.7/24;
            }
            family iso;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.7/32;
            }
            family iso {
                address 49.0001.0000.0000.0007.00;
            }
        }
    }
}
protocols {
    isis {
        interface ge-0/0/0.27;
        interface ge-0/0/0.67;
        interface ge-0/0/0.78;
        interface lo0.0;
        level 1 disable;
        level 2 wide-metrics-only;
    }
}
