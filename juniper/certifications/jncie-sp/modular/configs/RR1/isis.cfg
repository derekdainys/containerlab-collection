interfaces {
    ge-0/0/0 {
        vlan-tagging;
        unit 111 {
            vlan-id 111;
            family inet {
                address 172.30.111.11/24;
            }
            family inet6 {
                address 2001:172:30:111::11/64;
            }
            family iso;
        }
        unit 112 {
            vlan-id 112;
            family inet {
                address 172.30.112.11/24;
            }
            family inet6 {
                address 2001:172:30:112::11/64;
            }
            family iso;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.11/32;
            }
            family inet6 {
                address 2001:192:168::11/128;
            }
            family iso {
                address 49.0001.0000.0000.0011.00;
            }
        }
    }
}
protocols {
    isis {
        interface ge-0/0/0.111;
        interface ge-0/0/0.112;
        interface lo0.0;
        level 1 disable;
        level 2 wide-metrics-only;
    }
}
