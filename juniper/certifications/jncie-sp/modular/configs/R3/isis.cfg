interfaces {
    ge-0/0/0 {
        vlan-tagging;
        unit 23 {
            vlan-id 23;
            family inet {
                address 172.30.23.3/24;
            }
            family iso;
        }
        unit 34 {
            vlan-id 34;
            family inet {
                address 172.30.34.3/24;
            }
            family iso;
        }
        unit 36 {
            vlan-id 36;
            family inet {
                address 172.30.36.3/24;
            }
            family iso;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.3/32;
            }
            family iso {
                address 49.0001.0000.0000.0003.00;
            }
        }
    }
}
protocols {
    isis {
        interface ge-0/0/0.23;
        interface ge-0/0/0.34;
        interface ge-0/0/0.36;
        interface lo0.0;
        level 1 disable;
        level 2 wide-metrics-only;
    }
}
