interfaces {
    ge-0/0/0 {
        vlan-tagging;
    }
}
logical-systems {
    DC2 {
        interfaces {
            ge-0/0/0 {
                unit 202 {
                    vlan-id 202;
                    family inet {
                        address 172.30.202.102/24;
                    }
                }
                unit 204 {
                    vlan-id 204;
                    family inet {
                        address 172.30.204.102/24;
                    }
                }
            }
            lo0 {
                unit 2 {
                    family inet {
                        address 192.168.102.0/32;
                        address 192.168.102.1/32;
                        address 192.168.102.2/32;
                        address 192.168.102.3/32;
                    }
                }
            }
        }
        protocols {
            rip {
                group rip {
                    export direct;
                    neighbor ge-0/0/0.202;
                    neighbor ge-0/0/0.204;
                }
            }
        }
        policy-options {
            policy-statement direct {
                from protocol direct;
                then accept;
            }
        }
    }
    DC3 {                               
        interfaces {
            ge-0/0/0 {
                unit 203 {
                    vlan-id 203;
                    family inet {
                        address 172.30.203.103/24;
                    }
                    family inet6 {
                        address 2001:172:30:203::103/64;
                    }
                }
                unit 205 {
                    vlan-id 205;
                    family inet {
                        address 172.30.205.103/24;
                    }
                    family inet6 {
                        address 2001:172:30:205::103/64;
                    }
                }
            }
            lo0 {
                unit 3 {
                    family inet {
                        address 192.168.103.0/32;
                        address 192.168.103.1/32;
                        address 192.168.103.2/32;
                        address 192.168.103.3/32;
                    }
                    family inet6 {
                        address 2001:192:168:103::/128;
                        address 2001:192:168:103::1/128;
                        address 2001:192:168:103::2/128;
                        address 2001:192:168:103::3/128;
                    }
                }
            }
        }
        protocols {
            ospf3 {
                realm ipv4-unicast {
                    area 0.0.0.0 {
                        interface ge-0/0/0.203;
                        interface ge-0/0/0.205;
                        interface lo0.3;
                    }
                }
                area 0.0.0.0 {
                    interface ge-0/0/0.203;
                    interface ge-0/0/0.205;
                    interface lo0.3;
                }
            }
        }
    }
}
