interfaces {
    ge-0/0/0 {
        vlan-tagging;
        unit 18 {
            vlan-id 18;
            family inet {
                address 172.30.18.8/24;
            }
            family iso;
        }
        unit 58 {
            vlan-id 58;
            family inet {
                address 172.30.58.8/24;
            }
            family iso;
        }
        unit 78 {
            vlan-id 78;
            family inet {
                address 172.30.78.8/24;
            }
            family iso;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.8/32;
            }
            family iso {
                address 49.0001.0000.0000.0008.00;
            }
        }
    }
}
protocols {
    isis {
        interface ge-0/0/0.18;
        interface ge-0/0/0.58;
        interface ge-0/0/0.78;
        interface lo0.0;
        level 1 disable;
        level 2 wide-metrics-only;
    }
}
