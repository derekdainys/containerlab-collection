interfaces {
    ge-0/0/0 {
        vlan-tagging;
        unit 12 {
            vlan-id 12;
            family inet {
                address 172.30.12.2/24;
            }
            family inet6 {
                address 2001:172:30:12::2/64;
            }
            family iso;
        }
        unit 23 {
            vlan-id 23;
            family inet {
                address 172.30.23.2/24;
            }
            family inet6 {
                address 2001:172:30:23::2/64;
            }
            family iso;
        }
        unit 27 {
            vlan-id 27;
            family inet {
                address 172.30.27.2/24;
            }
            family inet6 {
                address 2001:172:30:27::2/64;
            }
            family iso;
        }
        unit 112 {
            vlan-id 112;
            family inet {
                address 172.30.112.2/24;
            }
            family inet6 {
                address 2001:172:30:112::2/64;
            }
            family iso;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.2/32;
            }
            family inet6 {
                address 2001:192:168::2/128;
            }
            family iso {
                address 49.0001.0000.0000.0002.00;
            }
        }
    }
}
protocols {
    isis {
        interface ge-0/0/0.12;
        interface ge-0/0/0.23;
        interface ge-0/0/0.27;
        interface ge-0/0/0.112;
        interface lo0.0;
        level 1 disable;
        level 2 wide-metrics-only;
    }
}
