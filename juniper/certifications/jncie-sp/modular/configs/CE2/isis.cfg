hostname {{ .ShortName }}
username admin privilege 15 secret admin
!
service routing protocols model multi-agent
!
{{- if .Env.CLAB_MGMT_VRF }}
vrf instance {{ .Env.CLAB_MGMT_VRF }}
!
{{end}}
{{ if .MgmtIPv4Gateway }}ip route {{ if .Env.CLAB_MGMT_VRF }}vrf {{ .Env.CLAB_MGMT_VRF }} {{end}}0.0.0.0/0 {{ .MgmtIPv4Gateway }}{{end}}
{{ if .MgmtIPv6Gateway }}ipv6 route {{ if .Env.CLAB_MGMT_VRF }}vrf {{ .Env.CLAB_MGMT_VRF }} {{end}}::0/0 {{ .MgmtIPv6Gateway }}{{end}}
!
interface {{ .MgmtIntf }}
{{ if .Env.CLAB_MGMT_VRF }} vrf {{ .Env.CLAB_MGMT_VRF }}{{end}}
{{ if .MgmtIPv4Address }}ip address {{ .MgmtIPv4Address }}/{{.MgmtIPv4PrefixLength}}{{end}}
{{ if .MgmtIPv6Address }}ipv6 address {{ .MgmtIPv6Address }}/{{.MgmtIPv6PrefixLength}}{{end}}
!
management api gnmi
   transport grpc default
{{ if .Env.CLAB_MGMT_VRF }}      vrf {{ .Env.CLAB_MGMT_VRF }}{{end}}
!
management api netconf
   transport ssh default
{{ if .Env.CLAB_MGMT_VRF }}      vrf {{ .Env.CLAB_MGMT_VRF }}{{end}}
!
management api http-commands
   no shutdown
{{- if .Env.CLAB_MGMT_VRF }}
   !
   vrf {{ .Env.CLAB_MGMT_VRF }}
      no shutdown
{{end}}
!
interface Ethernet1
   no switchport
   no shutdown
!
interface Ethernet1.203
    encapsulation dot1q vlan 203
    ip address 172.30.203.102/24
    ipv6 enable
    ipv6 address 2001:172:30:203::102/64
!
interface Ethernet1.205
    encapsulation dot1q vlan 205
    ip address 172.30.205.102/24
    ipv6 enable
    ipv6 address 2001:172:30:205::102/64
!
ip routing
ipv6 unicast-routing
!
router ospfv3
   address-family ipv4
   !
   address-family ipv6
   !
!
interface Ethernet1.203
   ospfv3 ipv6 area 0
   ospfv3 ipv4 area 0
!
interface Ethernet1.205
   ospfv3 ipv6 area 0
   ospfv3 ipv4 area 0
!
interface Loopback0
   ip address 192.168.102.0/32
   ipv6 enable
   ipv6 address 2001:192:168:102::/128
   ospfv3 ipv6 area 0
   ospfv3 ipv4 area 0
!
interface Loopback1
   ip address 192.168.102.1/32
   ipv6 enable
   ipv6 address 2001:192:168:102::1/128
   ospfv3 ipv6 area 0
   ospfv3 ipv4 area 0
!
interface Loopback2
   ip address 192.168.102.2/32
   ipv6 enable
   ipv6 address 2001:192:168:102::2/128
   ospfv3 ipv6 area 0
   ospfv3 ipv4 area 0
!
interface Loopback3
   ip address 192.168.102.3/32
   ipv6 enable
   ipv6 address 2001:192:168:102::3/128
   ospfv3 ipv6 area 0
   ospfv3 ipv4 area 0
!
