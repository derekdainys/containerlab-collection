interfaces {
    ge-0/0/0 {
        vlan-tagging;
        unit 36 {
            vlan-id 36;
            family inet {
                address 172.30.36.6/24;
            }
            family iso;
        }
        unit 56 {
            vlan-id 56;
            family inet {
                address 172.30.56.6/24;
            }
            family iso;
        }
        unit 67 {
            vlan-id 67;
            family inet {
                address 172.30.67.6/24;
            }
            family iso;
        }
        unit 126 {
            vlan-id 126;
            family inet {
                address 172.30.126.6/24;
            }
            family iso;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.6/32;
            }
            family iso {
                address 49.0001.0000.0000.0006.00;
            }
        }
    }
}
protocols {
    isis {
        interface ge-0/0/0.36;
        interface ge-0/0/0.56;
        interface ge-0/0/0.67;
        interface ge-0/0/0.126;
        interface lo0.0;
        level 1 disable;
        level 2 wide-metrics-only;
    }
}

