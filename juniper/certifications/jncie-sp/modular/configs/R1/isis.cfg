interfaces {
    ge-0/0/0 {
        vlan-tagging;
        unit 12 {
            vlan-id 12;
            family inet {
                address 172.30.12.1/24;
            }
            family inet6 {
                address 2001:172:30:12::1/64;
            }
            family iso;
        }
        unit 14 {
            vlan-id 14;
            family inet {
                address 172.30.14.1/24;
            }
            family inet6 {
                address 2001:172:30:14::1/64;
            }
            family iso;
        }
        unit 18 {
            vlan-id 18;
            family inet {
                address 172.30.18.1/24;
            }
            family inet6 {
                address 2001:172:30:18::1/64;
            }
            family iso;
        }
        unit 111 {
            vlan-id 111;
            family inet {
                address 172.30.111.1/24;
            }
            family inet6 {
                address 2001:172:30:111::1/64;
            }
            family iso;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.1/32;
            }
            family inet6 {
                address 2001:192:168::1/128;
            }
            family iso {
                address 49.0001.0000.0000.0001.00;
            }
        }
    }
}
protocols {
    isis {
        interface ge-0/0/0.12;
        interface ge-0/0/0.14;
        interface ge-0/0/0.18;
        interface ge-0/0/0.111;
        interface lo0.0;
        level 1 disable;
        level 2 wide-metrics-only;
    }
}

