interfaces {
    ge-0/0/0 {
        vlan-tagging;
        unit 125 {
            vlan-id 125;
            family inet {
                address 172.30.125.12/24;
            }
            family iso;
        }
        unit 126 {
            vlan-id 126;
            family inet {
                address 172.30.126.12/24;
            }
            family iso;
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.168.0.12/32;
            }
            family iso {
                address 49.0001.0000.0000.0012.00;
            }
        }
    }
}
protocols {
    isis {
        interface ge-0/0/0.125;
        interface ge-0/0/0.126;
        interface lo0.0;
        level 1 disable;
        level 2 wide-metrics-only;
    }
}
