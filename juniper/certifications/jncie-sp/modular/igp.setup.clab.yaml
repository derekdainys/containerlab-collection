name: modular
prefix: ""
topology:
  groups:
    junos:
      kind: juniper_vjunosrouter
      image: vjunos-router:25.4R1.12 
    ceos:
      kind: arista_ceos
      image: ceos:4.34.0F
  nodes:
    R1:
      group: junos
      startup-config: configs/R1/igp.setup.cfg
    R2:
      group: junos
      startup-config: configs/R2/igp.setup.cfg
    R3:
      group: junos
      startup-config: configs/R3/igp.setup.cfg
    R4:
      group: junos
      startup-config: configs/R4/igp.setup.cfg
    R5:
      group: junos
      startup-config: configs/R5/igp.setup.cfg
    R6:
      group: junos
      startup-config: configs/R6/igp.setup.cfg
    R7:
      group: junos
      startup-config: configs/R7/igp.setup.cfg
    R8:
      group: junos
      startup-config: configs/R8/igp.setup.cfg
    RR1:
      group: junos
      startup-config: configs/RR1/igp.setup.cfg
    RR2:
      group: junos
      startup-config: configs/RR2/igp.setup.cfg
    DC:
      group: junos
    SW1:
      group: ceos
      startup-config: configs/SW1.cfg
  links:
    - endpoints: ["SW1:eth1", "R1:ge-0/0/0"]
    - endpoints: ["SW1:eth2", "R2:ge-0/0/0"]
    - endpoints: ["SW1:eth3", "R3:ge-0/0/0"]
    - endpoints: ["SW1:eth4", "R4:ge-0/0/0"]
    - endpoints: ["SW1:eth5", "R5:ge-0/0/0"]
    - endpoints: ["SW1:eth6", "R6:ge-0/0/0"]
    - endpoints: ["SW1:eth7", "R7:ge-0/0/0"]
    - endpoints: ["SW1:eth8", "R8:ge-0/0/0"]
    - endpoints: ["SW1:eth9", "RR1:ge-0/0/0"]
    - endpoints: ["SW1:eth10", "RR2:ge-0/0/0"]
    - endpoints: ["SW1:eth11", "DC:ge-0/0/0"]
    - endpoints: ["R1:ge-0/0/1", "R2:ge-0/0/1"]
    - endpoints: ["R1:ge-0/0/2", "R2:ge-0/0/2"]
    - endpoints: ["R5:ge-0/0/1", "R6:ge-0/0/1"]
    - endpoints: ["R5:ge-0/0/2", "R6:ge-0/0/2"]
