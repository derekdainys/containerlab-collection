name: modular
prefix: ""
topology:
  groups:
    junos:
      kind: juniper_vjunosrouter
      image: vjunos-router:25.4R1.12 
    ceos:
      kind: arista_ceos
      image: ceos:4.34.0F
      env:
        CLAB_MGMT_VRF: MGMT
  nodes:
    R1:
      group: junos
      startup-config: configs/R1/isis.cfg
    R2:
      group: junos
      startup-config: configs/R2/isis.cfg
    R3:
      group: junos
      startup-config: configs/R3/isis.cfg
    R4:
      group: junos
      startup-config: configs/R4/isis.cfg
    R5:
      group: junos
      startup-config: configs/R5/isis.cfg
    R6:
      group: junos
      startup-config: configs/R6/isis.cfg
    R7:
      group: junos
      startup-config: configs/R7/isis.cfg
    R8:
      group: junos
      startup-config: configs/R8/isis.cfg
    RR1:
      group: junos
      startup-config: configs/RR1/isis.cfg
    RR2:
      group: junos
      startup-config: configs/RR2/isis.cfg
    CE1:
      group: ceos
      startup-config: configs/CE1/isis.cfg
    CE2:
      group: ceos
      startup-config: configs/CE2/isis.cfg
    CE3:
      group: ceos
    CE4:
      group: ceos
    CE5:
      group: ceos
    CE6:
      group: ceos
    CE7:
      group: ceos
    CE8:
      group: ceos
    CE9:
      group: ceos
    CE10:
      group: ceos
    CE11:
      group: ceos
    SW1:
      group: ceos
      startup-config: configs/SW1.cfg
  links:
    - endpoints: ["SW1:eth1", "R1:ge-0/0/0"]
    - endpoints: ["SW1:eth2", "R2:ge-0/0/0"]
    - endpoints: ["SW1:eth3", "R3:ge-0/0/0"]
    - endpoints: ["SW1:eth4", "R4:ge-0/0/0"]
    - endpoints: ["SW1:eth5", "R5:ge-0/0/0"]
    - endpoints: ["SW1:eth6", "R6:ge-0/0/0"]
    - endpoints: ["SW1:eth7", "R7:ge-0/0/0"]
    - endpoints: ["SW1:eth8", "R8:ge-0/0/0"]
    - endpoints: ["SW1:eth9", "RR1:ge-0/0/0"]
    - endpoints: ["SW1:eth10", "RR2:ge-0/0/0"]
    - endpoints: ["SW1:eth11", "CE1:eth1"]
    - endpoints: ["SW1:eth12", "CE2:eth1"]
    - endpoints: ["SW1:eth13", "CE3:eth1"]
    - endpoints: ["SW1:eth14", "CE4:eth1"]
    - endpoints: ["SW1:eth15", "CE5:eth1"]
    - endpoints: ["SW1:eth16", "CE6:eth1"]
    - endpoints: ["SW1:eth17", "CE7:eth1"]
    - endpoints: ["SW1:eth18", "CE8:eth1"]
    - endpoints: ["SW1:eth19", "CE9:eth1"]
    - endpoints: ["SW1:eth20", "CE10:eth1"]
    - endpoints: ["SW1:eth21", "CE11:eth1"]
    - endpoints: ["R1:ge-0/0/1", "R2:ge-0/0/1"]
    - endpoints: ["R1:ge-0/0/2", "R2:ge-0/0/2"]
    - endpoints: ["R5:ge-0/0/1", "R6:ge-0/0/1"]
    - endpoints: ["R5:ge-0/0/2", "R6:ge-0/0/2"]
